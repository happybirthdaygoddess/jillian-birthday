<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match ❤️</title>

    <link rel="stylesheet" href="memory.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <div class="container">

        <h1>🩷 Memory Match 🩷</h1>

        <p class="subtitle">
            Match all our memories to unlock your birthday surprise!
        </p>

        <!-- Scoreboard -->
        <div class="stats">

            <div class="stat-box">
                <span class="label">Moves</span>
                <span id="moves">0</span>
            </div>

            <div class="stat-box">
                <span class="label">Time</span>
                <span id="timer">00:00</span>
            </div>

            <div class="stat-box">
                <span class="label">Pairs</span>
                <span id="pairs">0 / 8</span>
            </div>

        </div>

        <!-- Game Board -->
        <div id="gameBoard" class="game-board">

            <!-- Cards are added automatically by JavaScript -->

        </div>

        <!-- Buttons -->
        <div class="buttons">

            <button id="restartBtn">
                🔄 Restart
            </button>

            <button onclick="window.location.href='index.html'">
                🏠 Back
            </button>

        </div>

    </div>

    <!-- WIN SCREEN -->
    <div id="winScreen" class="win-screen hidden">

        <div class="win-card">

            <h2>🎉 You Did It! 🎉</h2>

            <p>
                You matched every memory!
            </p>

            <h3 id="finalMoves"></h3>

            <h3 id="finalTime"></h3>

            <button id="giftBtn">
                🎁 Open Birthday Surprise
            </button>

        </div>

    </div>

    <!-- SURPRISE SCREEN -->
<div id="giftScreen" class="gift-screen hidden">

    <div class="gift-card">

        <h2>🎉 Happy Birthday Goddess! 🎉</h2>

        <img
            src="images/surprise.jpg"
            class="surprise-image"
            alt="Birthday Surprise">

        <p>
            Dahil natapos mo ung game,
            This is for u💖
        </p>

        <button id="closeGift">
            ❤️ Close
        </button>

    </div>

</div>

<audio id="bgMusic" loop>
    <source src="music/memory.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊 ibang music</button>

<script src="memory.js"></script>

</body>
</html>
